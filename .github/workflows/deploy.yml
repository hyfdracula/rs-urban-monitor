name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          # Mapbox public token（设计上即暴露在前端 JS，硬编码无安全风险；secret 方式注入不稳定故直接写）
          VITE_MAPBOX_TOKEN: pk.eyJ1IjoiaHlmZHJhY3VsYSIsImEiOiJjbXEwaW1md2cwc2V5MnFwd2o3b2R3czB3In0.35FykW5Oi8riNHyvxAgqqQ
          # 启用 Mapbox 暗色底图（USE_MAPBOX_STYLE=true → 用 mapbox dark-v11，否则空黑底图）
          VITE_USE_MAPBOX_STYLE: 'true'
          # GitHub Pages 部署在子路径 /rs-urban-monitor/，必须设 base
          # 否则构建产物资源是 /assets/... → 子路径下 404 → 白屏
          VITE_BASE: /rs-urban-monitor/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
