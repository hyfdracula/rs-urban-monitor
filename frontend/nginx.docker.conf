# ====================================================
#  RS Urban Monitor — Nginx Docker 配置
#  仅供 Docker 容器使用（docker-compose 的 frontend 服务）
#  与本地 nginx.conf 的区别：
#    1. proxy_pass 用 Docker 服务名（geoserver / backend）而非 127.0.0.1
#    2. root 指向容器内 nginx 默认目录
#    3. 日志走 stdout/stderr（docker logs 可见）
# ====================================================

server {
    listen 8080;
    server_name localhost;

    # 安全响应头（防 XSS / 点击劫持 / MIME 嗅探）
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 容器内日志走标准输出，docker logs 可见
    access_log /dev/stdout;
    error_log  /dev/stderr;

    root   /usr/share/nginx/html;
    index  index.html;

    # ===================== 前端静态文件 =====================
    location / {
        # Vue Router history 模式 — 所有路由都回退到 index.html
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ===================== GeoServer 反向代理 =====================
    # Docker 服务名 geoserver:8080（本地版是 127.0.0.1:8080）
    location /geoserver {
        proxy_pass http://geoserver:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;

        # 允许大请求（上传 GeoTIFF）
        client_max_body_size 500m;
        proxy_request_buffering off;
    }

    # ===================== FastAPI 反向代理 =====================
    # Docker 服务名 backend:8001（本地版是 127.0.0.1:8001）
    location /api {
        proxy_pass http://backend:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_read_timeout 300s;
        proxy_send_timeout 30s;

        client_max_body_size 500m;
        proxy_request_buffering off;
    }

    # ===================== Gzip 压缩 =====================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;
    gzip_comp_level 6;
}
