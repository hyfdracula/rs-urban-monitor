# ====================================================
#  RS Urban Monitor — Nginx 部署配置
#  使用方法:
#    1. npm run build
#    2. 将 dist/ 复制到 /var/www/rs-urban-monitor/
#    3. sudo cp nginx.conf /etc/nginx/sites-available/rs-urban
#    4. sudo ln -s /etc/nginx/sites-available/rs-urban /etc/nginx/sites-enabled/
#    5. sudo nginx -t && sudo nginx -s reload
# ====================================================

server {
    listen 80;
    server_name localhost;

    # 访问日志（生产环境建议开启）
    access_log /var/log/nginx/rs-urban-access.log;
    error_log  /var/log/nginx/rs-urban-error.log;

    root   /var/www/rs-urban-monitor/dist;
    index  index.html;

    # ===================== 前端静态文件 =====================
    location / {
        # Vue Router history 模式 — 所有路由都回退到 index.html
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ===================== GeoServer 反向代理 =====================
    location /geoserver {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # GeoServer 响应较慢，适当放宽超时
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;

        # 允许大请求（上传 GeoTIFF）
        client_max_body_size 500m;
        proxy_request_buffering off;
    }

    # ===================== FastAPI 反向代理 =====================
    location /api {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_read_timeout 300s;
        proxy_send_timeout 30s;

        client_max_body_size 500m;
        proxy_request_buffering off;
    }

    # ===================== Gzip 压缩 =====================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;
    gzip_comp_level 6;
}

